<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TikTok OAuth Callback — TechStream Bot</title>
  <style>
    body { font-family: -apple-system, system-ui, sans-serif; max-width: 640px; margin: 40px auto; padding: 0 16px }
    pre { background: #f5f5f5; padding: 12px; border: 1px solid #ccc; border-radius: 6px; word-break: break-all; white-space: pre-wrap }
    button { padding: 8px 16px; font-size: 14px; cursor: pointer }
  </style>
</head>
<body>
  <h1>TikTok OAuth callback</h1>
  <p>Copy the value below and paste it back into the bot setup:</p>
  <pre id="payload"></pre>
  <button onclick="navigator.clipboard.writeText(document.getElementById('payload').textContent)">Copy</button>
  <script>
    const u = new URL(window.location.href);
    const code = u.searchParams.get("code");
    const state = u.searchParams.get("state");
    const err = u.searchParams.get("error");
    const errd = u.searchParams.get("error_description");
    let out;
    if (err) out = "ERROR: " + err + "\n" + (errd || "");
    else if (code) out = code + (state ? "\n(state: " + state + ")" : "");
    else out = "(no code or error in URL)";
    document.getElementById("payload").textContent = out;
  </script>
</body>
</html>
